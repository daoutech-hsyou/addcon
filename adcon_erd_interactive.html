<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>애드콘 쿠폰판매 서비스 - 테이블 관계도</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Segoe UI", "Malgun Gothic", sans-serif; background: #0f1420; color: #e6e9ef; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 10px 16px; background: #161c2c; border-bottom: 1px solid #26304a; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: #8b95ab; }
  .controls { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls input { background: #0f1420; border: 1px solid #33405f; color: #e6e9ef; padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 200px; }
  .controls button { background: #26304a; border: 1px solid #33405f; color: #e6e9ef; padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .controls button:hover { background: #33405f; }
  #stage { flex: 1; position: relative; overflow: hidden; cursor: grab; }
  #stage.grabbing { cursor: grabbing; }
  svg { width: 100%; height: 100%; display: block; }
  .edge { stroke: #3b466380; stroke-width: 1; fill: none; }
  .edge.hl { stroke: #ffb454; stroke-width: 2; }
  .edge.dim { opacity: 0.06; }
  .node rect { rx: 6; ry: 6; stroke-width: 1.5; }
  .node text { font-size: 11px; fill: #eef1f6; pointer-events: none; }
  .node text.key { font-size: 9px; fill: #aab4cc; }
  .node.dim { opacity: 0.12; }
  .node.hub rect { stroke-width: 2.5; }
  .node { cursor: pointer; }
  .legend { position: absolute; left: 12px; bottom: 12px; background: #161c2ccc; border: 1px solid #26304a; border-radius: 8px; padding: 10px 12px; font-size: 12px; max-width: 230px; }
  .legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; cursor: pointer; }
  .legend .row:hover { color: #fff; }
  .legend .sw { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .panel { position: absolute; right: 12px; top: 12px; width: 260px; background: #161c2ccc; border: 1px solid #26304a; border-radius: 8px; padding: 12px 14px; font-size: 12px; display: none; }
  .panel h3 { margin: 0 0 6px; font-size: 14px; }
  .panel .tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px; margin-bottom: 8px; }
  .panel ul { margin: 6px 0 0; padding-left: 16px; color: #b9c2d8; }
  .panel .hint { color: #7b8399; font-size: 11px; margin-top: 8px; }
  .footnote { position: absolute; left: 12px; top: 12px; font-size: 11px; color: #66708a; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>애드콘(ADCON) 쿠폰판매 서비스 · 테이블 관계도</h1>
      <div class="sub">DB: 3n1_db (donut) · 총 110개 테이블 · 관계는 컬럼명 규칙 기반 추론(명시적 FK 없음)</div>
    </div>
    <div class="controls">
      <input id="search" type="text" placeholder="테이블명 검색 (예: bill, point)">
      <button id="reset">전체보기</button>
      <button id="zin">+</button>
      <button id="zout">−</button>
    </div>
  </header>
  <div id="stage">
    <svg id="svg">
      <g id="viewport">
        <g id="edges"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div class="footnote">마우스 드래그: 이동 · 휠: 확대/축소 · 노드 클릭: 관계 강조</div>
    <div class="legend" id="legend"></div>
    <div class="panel" id="panel"></div>
  </div>
</div>

  ["donut_admin_work_history","admin","작업이력"],["service_option","admin","서비스옵션"],
  ["ip_blacklist","admin","IP차단"],["ip_whitelist","admin","예외IP"],["ip_whitelist_history","admin","예외IP이력"],

  ["sleep_statt","stat","별도보관구문"],["sleep_usert","stat","휴면대상자"],
  ["donut_static_sales","stat","판매통계"],["donut_static_sales_status","stat","판매현황"],
  ["donut_static_send_sales_status","stat","발송판매현황"],["STATIC_TRADE_SALES","stat","거래액통계"],
  ["DONUT_CRM_TRACKING","stat","CRM트래킹"],
];

// ---------- 관계 정의 [child, parent, label] ----------
const R = [
  // user hub
  ["oauth_user","donut_user"],["kmc_auth_history","donut_user"],["donut_daoupay_auth","donut_user"],
  ["donut_company","donut_user"],["biz_user_request","donut_user"],["donut_user_option","donut_user"],
  ["donut_user_option_history","donut_user"],["donut_user_quit","donut_user"],["donut_user_sleep","donut_user"],
  ["donut_user_sleep_target","donut_user"],["grade_adjust","donut_user"],["donut_monthly_stat","donut_user"],
  ["donut_cart","donut_user"],["donut_bill","donut_user"],["donut_bill_pg","donut_user"],
  ["donut_order","donut_user"],["bill_private_account","donut_user"],["bill_private_account_history","donut_user"],
  ["giftcard_auth_log","donut_user"],["donut_deposit","donut_user"],["donut_deposit_history","donut_user"],
  ["bill_saving_history","donut_user"],["donut_point","donut_user"],["donut_point_history","donut_user"],
  ["donut_point_use","donut_user"],["npay_point_convert_history","donut_user"],["donut_msg","donut_user"],
  ["donut_send_approval","donut_user"],["donut_msg_storage","donut_user"],["donut_mms_templet","donut_user"],
  ["donut_sendphone","donut_user"],["donut_sendphone_history","donut_user"],["donut_daoupay_bill","donut_user"],
  ["pick_order","donut_user"],["donut_addr_group","donut_user"],["donut_addr_list","donut_user"],
  ["donut_counsel_bulk","donut_user"],["donut_qna","donut_user"],["donut_event_apply","donut_user"],
  ["donut_event_biz_apply","donut_user"],["donut_roulette_apply","donut_user"],["external_event_apply","donut_user"],
  ["event_payback_first_order","donut_user"],["event_payback_apply","donut_user"],
  ["event_recommend_apply","donut_user","추천/피추천"],
  // goods hub
  ["donut_brand","donut_category"],["donut_goods","donut_brand"],["purchase_limit","donut_brand"],
  ["delivery_goods_option","donut_goods"],["goods_display_reason","donut_goods"],["purchase_goods_limit","donut_goods"],
  ["donut_sales_stat","donut_goods"],["donut_static_goods","donut_goods"],["donut_cart","donut_goods"],
  ["donut_order","donut_goods"],["donut_msg","donut_goods"],["donut_promotion_goods","donut_goods"],
  ["theme_goods","donut_goods"],["donut_event_goods","donut_goods","b2c/b2b"],["donut_event_biz_goods","donut_goods"],
  ["external_event_apply","donut_goods"],["external_event_goods","donut_goods"],["donut_daoupay_bill","donut_goods","first_goods"],
  ["donut_roulette_goods","donut_goods","b2b/b2c"],["pick_order","donut_goods","1/2/3rd"],["pick_msg","donut_goods","choice"],
  // bill hub
  ["donut_bill_pg","donut_bill"],["donut_order","donut_bill"],["bill_private_account","donut_bill"],
  ["bill_private_account_history","donut_bill"],["bill_saving_history","donut_bill"],["giftcard_auth_log","donut_bill"],

  ["donut_reserve_msg","donut_bill"],["donut_send_approval","donut_bill"],["donut_daoupay_bill","donut_bill"],
  ["pick_order","donut_bill"],["donut_event_apply","donut_bill"],["event_recommend_apply","donut_bill"],
  ["event_payback_first_order","donut_bill"],["external_event_apply","donut_bill"],
  // order
  ["donut_msg","donut_order"],["donut_reserve_msg","donut_order"],

  ["donut_deposit_history","donut_deposit"],["donut_point_history","donut_point"],["donut_point_use","donut_point_history"],

  ["send_msg_history","donut_msg"],["donut_daoupay_msg","donut_daoupay_bill"],["pick_msg","pick_order"],

  ["donut_event_apply","donut_content"],["donut_daoupay_bill","donut_content"],["event_recommend","donut_content"],

// ---------- 레이아웃 계산 ----------
const NW = 150, NH = 34, GAP_Y = 46, COL_W = 330, PAD = 40;
const domainOrder = Object.keys(DOMAINS);
const byDomain = {};
domainOrder.forEach(d => byDomain[d] = []);
const nodeMap = {};
T.forEach(t => {
  const [id, domain, key, hub] = t;
  const n = { id, domain, key, hub: !!hub };
  nodeMap[id] = n;
  if (byDomain[domain]) byDomain[domain].push(n);
});
// 도메인을 5열 그리드로 배치 (각 그리드 행은 위쪽 행들의 최대 높이만큼 내려감)
const gridCols = 5;
const innerColsOf = list => list.length > 12 ? 2 : 1;
const rowsOf = list => Math.ceil(list.length / innerColsOf(list));
const numGridRows = Math.ceil(domainOrder.length / gridCols);
const gridRowY = [];
{
  let acc = 0;
  for (let gr = 0; gr < numGridRows; gr++) {
    let maxRows = 0;
    domainOrder.forEach((d, i) => { if (Math.floor(i / gridCols) === gr) maxRows = Math.max(maxRows, rowsOf(byDomain[d])); });
    gridRowY[gr] = acc;
    acc += maxRows * GAP_Y + 90;
  }
}
domainOrder.forEach((d, di) => {
  const gx = di % gridCols, gy = Math.floor(di / gridCols);
  const list = byDomain[d];
  const colBaseX = gx * COL_W + PAD;
  const innerCols = innerColsOf(list);
  const baseY = gridRowY[gy];
  list.forEach((n, i) => {
    const ic = i % innerCols, ir = Math.floor(i / innerCols);
    n.x = colBaseX + ic * (NW + 12);
    n.y = baseY + 60 + ir * GAP_Y;
  });
  byDomain[d]._label = { x: colBaseX, y: baseY + 30, name: DOMAINS[d].name };
});

// ---------- SVG 렌더 ----------
const svg = document.getElementById("svg");
const gEdges = document.getElementById("edges");
const gNodes = document.getElementById("nodes");
const NS = "http://www.w3.org/2000/svg";

function el(tag, attrs) { const e = document.createElementNS(NS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }

// 도메인 라벨
domainOrder.forEach(d => {
  const lb = byDomain[d]._label;
  const t = el("text", { x: lb.x, y: lb.y, "font-size": 14, "font-weight": "700", fill: DOMAINS[d].color });
  t.textContent = "● " + lb.name;
  gNodes.appendChild(t);
});

// 엣지
const edgeEls = [];
const adj = {};
R.forEach(r => {
  const [c, p, label] = r;
  const cn = nodeMap[c], pn = nodeMap[p];
  if (!cn || !pn) return;
  const x1 = cn.x + NW/2, y1 = cn.y, x2 = pn.x + NW/2, y2 = pn.y;
  const mx = (x1 + x2) / 2;
  const path = el("path", { d: `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`, class: "edge" });
  path.dataset.c = c; path.dataset.p = p;
  gEdges.appendChild(path);
  edgeEls.push(path);
  (adj[c] = adj[c] || []).push(p);
  (adj[p] = adj[p] || []).push(c);
});

// 노드
const nodeEls = {};
Object.values(nodeMap).forEach(n => {
  const g = el("g", { class: "node" + (n.hub ? " hub" : ""), transform: `translate(${n.x},${n.y - NH/2})` });
  const rect = el("rect", { width: NW, height: NH, fill: "#1b2336", stroke: DOMAINS[n.domain].color });
  const t1 = el("text", { x: 8, y: 14 }); t1.textContent = n.id.length > 22 ? n.id.slice(0,21)+"…" : n.id;
  const t2 = el("text", { x: 8, y: 27, class: "key" }); t2.textContent = n.key;
  g.appendChild(rect); g.appendChild(t1); g.appendChild(t2);
  g.addEventListener("click", (e) => { e.stopPropagation(); selectNode(n.id); });
  g.addEventListener("mouseenter", () => hoverNode(n.id, true));
  g.addEventListener("mouseleave", () => { if (!selected) clearHL(); });
  gNodes.appendChild(g);
  nodeEls[n.id] = g;
});

// ---------- 인터랙션: 강조 ----------
let selected = null;
function setHL(centerId) {
  const connected = new Set([centerId, ...(adj[centerId] || [])]);
  edgeEls.forEach(e => {
    const on = e.dataset.c === centerId || e.dataset.p === centerId;
    e.classList.toggle("hl", on);
    e.classList.toggle("dim", !on);
  });
  Object.values(nodeMap).forEach(n => {
    nodeEls[n.id].classList.toggle("dim", !connected.has(n.id));
  });
}
function clearHL() {
  edgeEls.forEach(e => { e.classList.remove("hl","dim"); });
  Object.values(nodeMap).forEach(n => nodeEls[n.id].classList.remove("dim"));
  panel.style.display = "none";
}
function hoverNode(id) { if (!selected) setHL(id); }
function selectNode(id) {
  selected = id; setHL(id);
  const n = nodeMap[id];
  const parents = R.filter(r => r[0] === id).map(r => r[1] + (r[2]?` (${r[2]})`:""));
  const children = R.filter(r => r[1] === id).map(r => r[0] + (r[2]?` (${r[2]})`:""));
  panel.style.display = "block";
  panel.innerHTML = `<h3>${id}</h3>
    <span class="tag" style="background:${DOMAINS[n.domain].color}33;color:${DOMAINS[n.domain].color}">${DOMAINS[n.domain].name}</span>
    <div>${n.key}</div>
    ${parents.length?`<div style="margin-top:8px"><b>참조 →</b><ul>${parents.map(x=>`<li>${x}</li>`).join("")}</ul></div>`:""}
    ${children.length?`<div style="margin-top:8px"><b>← 참조됨 (${children.length})</b><ul>${children.slice(0,20).map(x=>`<li>${x}</li>`).join("")}${children.length>20?`<li>… 외 ${children.length-20}개</li>`:""}</ul></div>`:""}
    <div class="hint">빈 곳 클릭 시 해제</div>`;
}
const panel = document.getElementById("panel");

// ---------- 팬/줌 ----------
let scale = 0.65, tx = 60, ty = 20, dragging = false, sx, sy;
const vp = document.getElementById("viewport");
const stage = document.getElementById("stage");
function apply() { vp.setAttribute("transform", `translate(${tx},${ty}) scale(${scale})`); }
apply();
stage.addEventListener("mousedown", e => { dragging = true; sx = e.clientX - tx; sy = e.clientY - ty; stage.classList.add("grabbing"); if (e.target === svg || e.target.id==="viewport" || e.target===stage) { selected = null; clearHL(); } });
window.addEventListener("mousemove", e => { if (!dragging) return; tx = e.clientX - sx; ty = e.clientY - sy; apply(); });
window.addEventListener("mouseup", () => { dragging = false; stage.classList.remove("grabbing"); });
stage.addEventListener("wheel", e => { e.preventDefault(); const f = e.deltaY < 0 ? 1.12 : 0.89; const rect = stage.getBoundingClientRect(); const mx = e.clientX - rect.left, my = e.clientY - rect.top; tx = mx - (mx - tx) * f; ty = my - (my - ty) * f; scale *= f; apply(); }, { passive: false });
document.getElementById("zin").onclick = () => { scale *= 1.2; apply(); };
document.getElementById("zout").onclick = () => { scale *= 0.83; apply(); };
document.getElementById("reset").onclick = () => { scale = 0.65; tx = 60; ty = 20; selected = null; clearHL(); document.getElementById("search").value=""; apply(); };

// ---------- 검색 ----------
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { clearHL(); selected=null; return; }
  const matches = new Set(Object.keys(nodeMap).filter(id => id.toLowerCase().includes(q)));
  edgeEls.forEach(el2 => el2.classList.add("dim"));
  Object.values(nodeMap).forEach(n => nodeEls[n.id].classList.toggle("dim", !matches.has(n.id)));
});

// ---------- 레전드 ----------
const legend = document.getElementById("legend");
legend.innerHTML = "<div style='font-weight:700;margin-bottom:6px'>도메인</div>" +
  domainOrder.map(d => `<div class="row" data-d="${d}"><span class="sw" style="background:${DOMAINS[d].color}"></span>${DOMAINS[d].name} <span style="color:#66708a">(${byDomain[d].length})</span></div>`).join("");
legend.querySelectorAll(".row").forEach(row => {
  row.addEventListener("click", () => {
    const d = row.dataset.d;
    const ids = new Set(byDomain[d].map(n => n.id));
    edgeEls.forEach(el2 => el2.classList.add("dim"));
    Object.values(nodeMap).forEach(n => nodeEls[n.id].classList.toggle("dim", !ids.has(n.id)));
    selected = "domain";
  });
});
</script>
</body>
</html>
